<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pokémon Explorer</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages — GitHub Pages has no server-side
      // rewrites, so a direct link to a route like /pokemon/charizard 404s.
      // This encodes the intended path into a query string and redirects to
      // index.html, which decodes it back (see the script in index.html).
      // pathSegmentsToKeep = 1 preserves the /PokemonExplorer/ repo segment.
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1

      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
